services:
  app:
    build: .
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_PORT: "3000"
      DB_PATH: /data/roast-log.sqlite3
      UPLOAD_DIR: /uploads
    volumes:
      - roast_data:/data
      - roast_uploads:/uploads
    networks:
      - roast_internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - roast_internal

volumes:
  roast_data:
  roast_uploads:
  caddy_data:
  caddy_config:

networks:
  roast_internal:
    driver: bridge
