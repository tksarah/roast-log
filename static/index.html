<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>焙煎日記 | Coffee Roast Diary</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <link rel="stylesheet" href="/static/landing.css" />
  </head>
  <body>
    <div class="lp-shell" id="top">
      <header class="lp-header">
        <a class="lp-brand" href="#top" aria-label="焙煎日記 ホーム">
          <img src="/assets/icon.png" alt="" />
          <span>
            <strong>焙煎日記</strong>
            <small>Coffee Roast Diary</small>
          </span>
        </a>
        <nav class="lp-nav" aria-label="メインナビゲーション">
          <a class="is-active" href="#top">ホーム</a>
          <a href="#favorites">お気に入り</a>
        </nav>
        <div class="lp-actions">
          <a class="utility-link" href="/admin/" aria-label="マイページ">
            <span aria-hidden="true">●</span>
            マイページ
          </a>
        </div>
      </header>

      <main>
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-art" role="img" aria-label="焙煎豆と道具が並ぶ Coffee Roast Diary のヒーロービジュアル">
            <div class="hero-copy visually-hidden">
              <h1 id="hero-title">焙煎の一日を、<br />香りごと記録する。</h1>
              <p class="hero-text">
                生豆から一杯のコーヒーになるまで。その時の気づきや感動を、日記のように残していく場所。
              </p>
            </div>
            <a class="button-primary hero-cta" href="/admin/">焙煎記録をつける <span aria-hidden="true">→</span></a>
          </div>
        </section>

        <section class="section journal-section" id="journal" aria-labelledby="journal-title">
          <div class="section-head">
            <div>
              <p class="section-kicker">最近の焙煎記録</p>
              <h2 id="journal-title">最近の焙煎記録</h2>
            </div>
            <a class="section-link" href="#journal">すべての焙煎記録を見る <span aria-hidden="true">→</span></a>
          </div>
          <div id="journal-grid" class="journal-grid" aria-live="polite"></div>
        </section>

        <section class="section favorites-section" id="favorites" aria-labelledby="favorites-title">
          <div class="section-head">
            <div>
              <p class="section-kicker heart">お気に入りの焙煎</p>
              <h2 id="favorites-title">お気に入りの焙煎</h2>
            </div>
            <a class="section-link" href="#favorites">お気に入り一覧を見る <span aria-hidden="true">→</span></a>
          </div>
          <button class="carousel-arrow left" type="button" aria-label="前へ">‹</button>
          <div id="favorite-list" class="favorite-list" aria-live="polite"></div>
          <button class="carousel-arrow right" type="button" aria-label="次へ">›</button>
        </section>
      </main>
      <footer class="lp-footer">
        <div>
          <strong>焙煎日記</strong>
          <p>気づきも香りも、次の一杯につながる記録に。</p>
        </div>
        <a class="footer-link" href="/admin/">マイページ</a>
        <small>© 2026 Coffee Roast Diary</small>
      </footer>
    </div>
    <script src="/static/public.js"></script>
  </body>
</html>
